services:
  postgres:
    image: postgres:16-alpine
    container_name: infinite-craft-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: craft
      POSTGRES_PASSWORD: craft
      POSTGRES_DB: infinite_craft
    ports:
      # Host 5433 to avoid clashing with other local Postgres instances.
      - "5433:5432"
    volumes:
      - craft_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U craft -d infinite_craft"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: infinite-craft-redis
    restart: unless-stopped
    ports:
      # Host 6380 to avoid clashing with other local Redis instances.
      - "6380:6379"
    volumes:
      - craft_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  craft_pgdata:
  craft_redisdata:
