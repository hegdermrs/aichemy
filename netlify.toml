# Netlify config. The official Next.js runtime plugin handles App Router,
# API routes, and image optimization. DATABASE_URL / REDIS_URL / DEEPSEEK_*
# must be set in the Netlify site environment (see DEPLOY.md).
[build]
  command = "prisma generate && prisma migrate deploy && next build"
  publish = ".next"

[build.environment]
  # Next 16 / React 19 need a modern Node runtime.
  NODE_VERSION = "20"
  # These two are public (API endpoint + model name) and appear as code
  # defaults, so exclude them from Netlify's secret scanner. The real secret
  # (DEEPSEEK_API_KEY) and the DB/Redis URLs are still scanned.
  SECRETS_SCAN_OMIT_KEYS = "DEEPSEEK_BASE_URL,DEEPSEEK_MODEL"

[[plugins]]
  package = "@netlify/plugin-nextjs"
